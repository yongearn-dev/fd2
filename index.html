<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>神奇字母 FD2</title>
<link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
<script src="https://v8.js-dos.com/latest/js-dos.js"></script>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #000;
    width: 100%; height: 100%;
    overflow: hidden;
  }
  #jsdos {
    width: 100vw;
    height: 100vh;
    position: relative;
  }
  #status {
    position: fixed;
    top: 0; left: 0;
    color: #0f0;
    background: rgba(0,0,0,0.85);
    font-family: monospace;
    font-size: 13px;
    padding: 8px;
    z-index: 9999;
    white-space: pre-wrap;
    max-width: 100vw;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div id="status">載入中 / Loading...</div>
  <div id="jsdos"></div>
  <script>
    var statusEl = document.getElementById("status");
    function log(msg) {
      console.log(msg);
      statusEl.textContent += "\n" + msg;
    }

    window.addEventListener("error", function(e) {
      log("JS ERROR: " + e.message);
    });

    log("Page loaded. js-dos: " + (window.Dos ? "found" : "NOT FOUND") + " typeof=" + typeof window.Dos);

    if (window.Dos) {
      var result = Dos(document.getElementById("jsdos"), {
        url: "game.zip",
        autoStart: true,
        kiosk: false,
        onEvent: function(event, ci) {
          log("Event: " + event);
          if (event === "emu-ready") {
            log("Emulator ready");
          }
          if (event === "bnd-play") {
            log("Bundle playing");
            statusEl.style.display = "none";
          }
          if (event === "ci-error") {
            log("CI ERROR");
          }
        }
      });
      log("Dos() returned, type=" + typeof result);
    } else {
      log("Dos() function not available - js-dos failed to load.");
    }
  </script>
</body>
</html>

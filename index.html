<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>炎龍騎士團2 (FD2)</title>
<link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
<script src="https://v8.js-dos.com/latest/js-dos.js"></script>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #000;
    width: 100%; height: 100%;
    overflow: hidden;
  }
  #jsdos {
    width: 100vw;
    height: 100vh;
    position: relative;
  }
  #status {
    position: fixed;
    top: 0; left: 0;
    color: #0f0;
    background: rgba(0,0,0,0.85);
    font-family: monospace;
    font-size: 12px;
    padding: 8px;
    z-index: 9999;
    white-space: pre-wrap;
    max-width: 100vw;
    max-height: 50vh;
    overflow: auto;
    pointer-events: none;
    display: none; /* 只在有錯誤時顯示 */
  }
  /* 攻略按鈕 */
  #guide-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 9998;
    background: rgba(30, 80, 160, 0.85);
    color: #fff;
    font-family: -apple-system, sans-serif;
    font-size: 14px;
    padding: 8px 14px;
    border-radius: 20px;
    text-decoration: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    -webkit-tap-highlight-color: transparent;
  }
  #guide-btn:active {
    background: rgba(30, 80, 160, 1);
  }
</style>
</head>
<body>
  <div id="status">載入中 / Loading...</div>
  <a id="guide-btn" href="https://chiuinan.github.io/game/game/intro/ch/c31/fd2/index.htm" target="_blank" rel="noopener">📖 攻略</a>
  <div id="jsdos"></div>
  <script>
    var statusEl = document.getElementById("status");
    var hasError = false;
    function log(msg) {
      console.log(msg);
      statusEl.textContent += "\n" + msg;
    }
    function showError(msg) {
      hasError = true;
      statusEl.style.display = "block";
      log(msg);
    }

    window.addEventListener("error", function(e) {
      showError("JS ERROR: " + e.message);
    });

    if (window.Dos) {
      Dos(document.getElementById("jsdos"), {
        url: "game.zip",
        autoStart: true,
        kiosk: false,

        // ===== 自訂虛擬鍵盤 =====
        // 第一頁(遊戲操作): 左邊方向鍵 + Backspace/Enter, 右邊 Esc + 切換頁
        // 第二頁(功能鍵): F1-F12, 下面 Shift/Ctrl/Alt
        softKeyboardLayout: [
          [
            // 左邊群組
            [
              "{bksp} {enter}",
              "{up}",
              "{left} {down} {right}"
            ],
            // 右邊群組
            [
              "{esc}",
              "{layout}"
            ]
          ],
          [
            // 第二頁: 功能鍵
            [
              "{f1} {f2} {f3} {f4} {f5} {f6}",
              "{f7} {f8} {f9} {f10} {f11} {f12}",
              "{shift} {ctrl} {alt}",
              "{layout}"
            ]
          ]
        ],

        onEvent: function(event, ci) {
          log("Event: " + event);
          if (event === "bnd-play") {
            statusEl.style.display = "none";
          }
          if (event === "ci-error") {
            showError("CI ERROR");
          }
        }
      });
    } else {
      showError("Dos() function not available - js-dos failed to load.");
    }
  </script>
</body>
</html>

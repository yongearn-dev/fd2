<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>神奇字母 FD2</title>
<link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
<script src="https://v8.js-dos.com/latest/js-dos.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #000;
    width: 100%; height: 100%;
    overflow: hidden;
  }
  #jsdos {
    width: 100vw;
    height: 100vh;
    position: relative;
  }
  #status {
    position: fixed;
    top: 0; left: 0;
    color: #0f0;
    background: rgba(0,0,0,0.85);
    font-family: monospace;
    font-size: 12px;
    padding: 8px;
    z-index: 9999;
    white-space: pre-wrap;
    max-width: 100vw;
    max-height: 100vh;
    overflow: auto;
    pointer-events: auto;
  }
</style>
</head>
<body>
  <div id="status">載入中 / Loading...</div>
  <div id="jsdos"></div>
  <script>
    var statusEl = document.getElementById("status");
    function log(msg) {
      console.log(msg);
      statusEl.textContent += "\n" + msg;
    }

    window.addEventListener("error", function(e) {
      log("JS ERROR: " + e.message);
    });

    log("Page loaded. js-dos: " + (window.Dos ? "found" : "NOT FOUND"));

    // 先用 JSZip 檢查 game.zip 內容
    fetch("game.zip?t=" + Date.now())
      .then(function(resp) {
        log("Fetched game.zip, status=" + resp.status + " size=" + resp.headers.get("content-length"));
        return resp.arrayBuffer();
      })
      .then(function(buf) {
        log("ArrayBuffer size=" + buf.byteLength);
        return JSZip.loadAsync(buf);
      })
      .then(function(zip) {
        log("--- ZIP 內容 (前30個) ---");
        var names = Object.keys(zip.files);
        names.slice(0, 30).forEach(function(n) {
          log(n);
        });
        log("總共 " + names.length + " 個項目");
        log("------------------------");

        // 然後再啟動 js-dos
        if (window.Dos) {
          Dos(document.getElementById("jsdos"), {
            url: "game.zip?t=" + Date.now(),
            autoStart: true,
            kiosk: false,
            onEvent: function(event, ci) {
              log("Event: " + event);
              if (event === "bnd-play") {
                statusEl.style.display = "none";
              }
            }
          });
        }
      })
      .catch(function(err) {
        log("FETCH/ZIP ERROR: " + err);
      });
  </script>
</body>
</html>

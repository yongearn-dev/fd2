<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>炎龍騎士團2 (FD2)</title>
<link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
<script src="https://v8.js-dos.com/latest/js-dos.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  html, body { margin:0; padding:0; background:#000; width:100%; height:100%; overflow:hidden; }
  #jsdos { width:100vw; height:100vh; position:relative; }
  #status {
    position:fixed; top:0; left:0; color:#0f0;
    background:rgba(0,0,0,0.85); font-family:monospace; font-size:12px;
    padding:8px; z-index:9999; white-space:pre-wrap;
    max-width:100vw; max-height:50vh; overflow:auto; pointer-events:none;
  }
  #guide-btn {
    position:fixed; top:10px; right:10px; z-index:9998;
    background:rgba(30,80,160,0.85); color:#fff;
    font-family:-apple-system,sans-serif; font-size:14px;
    padding:8px 14px; border-radius:20px; text-decoration:none;
    box-shadow:0 2px 6px rgba(0,0,0,0.4); -webkit-tap-highlight-color:transparent;
  }
  #guide-btn:active { background:rgba(30,80,160,1); }
  #save-toast {
    position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
    background:rgba(0,120,0,0.9); color:#fff; padding:8px 20px;
    border-radius:20px; font-family:monospace; font-size:13px;
    z-index:9997; display:none; pointer-events:none;
  }
</style>
</head>
<body>
  <div id="status">載入中 / Loading...</div>
  <a id="guide-btn" href="https://chiuinan.github.io/game/game/intro/ch/c31/fd2/index.htm" target="_blank" rel="noopener">📖 攻略</a>
  <div id="save-toast">💾 進度已自動儲存</div>
  <div id="jsdos"></div>
  <script>
    var statusEl = document.getElementById("status");
    var toastEl  = document.getElementById("save-toast");
    var globalCi = null;

    function log(msg) { console.log(msg); statusEl.textContent += "\n" + msg; }
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.style.display = "block";
      setTimeout(function(){ toastEl.style.display = "none"; }, 2500);
    }

    window.addEventListener("error", function(e){ log("JS ERROR: " + e.message); });

    // 先驗證game.zip實際內容,確認唔係cache咗舊版
    fetch("game.zip?verify=" + Date.now())
      .then(function(resp){
        log("game.zip HTTP " + resp.status + ", size=" + resp.headers.get("content-length") + " bytes");
        return resp.arrayBuffer();
      })
      .then(function(buf){
        log("實際下載size=" + buf.byteLength + " bytes");
        // 用JSZip驗證.jsdos/dosbox.conf是否存在(若已載入JSZip)
        if (window.JSZip) {
          return JSZip.loadAsync(buf).then(function(zip){
            var hasConf = !!zip.files[".jsdos/dosbox.conf"];
            log(".jsdos/dosbox.conf 存在於下載的zip: " + hasConf);
            if (hasConf) {
              return zip.files[".jsdos/dosbox.conf"].async("string").then(function(txt){
                log("conf內容: " + JSON.stringify(txt));
              });
            }
          });
        }
      })
      .catch(function(e){ log("驗證失敗: " + e); });

    // ===== IndexedDB save/load helper =====
    var DB_NAME  = "fd2_saves";
    var DB_STORE = "files";
    var SAVE_KEY = "FD2.SAV";

    function openDB(cb) {
      var req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function(e) {
        e.target.result.createObjectStore(DB_STORE);
      };
      req.onsuccess = function(e) { cb(null, e.target.result); };
      req.onerror   = function(e) { cb(e.target.error); };
    }

    function dbGet(key, cb) {
      openDB(function(err, db) {
        if (err) return cb(err);
        var tx  = db.transaction(DB_STORE, "readonly");
        var req = tx.objectStore(DB_STORE).get(key);
        req.onsuccess = function(e) { cb(null, e.target.result); };
        req.onerror   = function(e) { cb(e.target.error); };
      });
    }

    function dbSet(key, val, cb) {
      openDB(function(err, db) {
        if (err) return cb && cb(err);
        var tx  = db.transaction(DB_STORE, "readwrite");
        tx.objectStore(DB_STORE).put(val, key);
        tx.oncomplete = function() { cb && cb(null); };
        tx.onerror    = function(e){ cb && cb(e.target.error); };
      });
    }

    // 從遊戲虛擬FS讀FD2.SAV並存入IndexedDB
    function persistSave(ci, silent) {
      ci.fsReadFile(SAVE_KEY).then(function(data) {
        if (!data || data.length === 0) return;
        dbSet(SAVE_KEY, data, function(err) {
          if (!err && !silent) showToast("💾 進度已自動儲存");
          if (!err) log("SAV saved to IndexedDB (" + data.length + " bytes)");
        });
      }).catch(function(e){ log("fsReadFile err: " + e); });
    }

    // ===== 啟動 js-dos =====
    if (window.Dos) {
      Dos(document.getElementById("jsdos"), {
        url: "game.zip?nocache=" + Date.now(),
        autoStart: true,
        kiosk: false,

        softKeyboardLayout: [
          [
            [ "{esc}", "{layout}" ],
            [ "{up}", "{left} {down} {right}" ],
            [ "{enter}", "{bksp}" ]
          ],
          [
            [
              "{f1} {f2} {f3} {f4} {f5} {f6}",
              "{f7} {f8} {f9} {f10} {f11} {f12}",
              "{shift} {ctrl} {alt} {layout}"
            ]
          ]
        ],
        softKeyboardSymbols: [{
          "{esc}":"Esc", "{layout}":"更多", "{enter}":"Enter", "{bksp}":"Del",
          "{up}":"↑", "{down}":"↓", "{left}":"←", "{right}":"→",
          "{shift}":"Shift", "{ctrl}":"Ctrl", "{alt}":"Alt"
        }],

        onEvent: function(event, ci) {
          log("Event: " + event);

          if (event === "ci-ready") {
            globalCi = ci;

            // 嘗試從IndexedDB讀返存檔,覆蓋zip入面嘅舊SAV
            dbGet(SAVE_KEY, function(err, savedData) {
              if (!err && savedData && savedData.length > 0) {
                log("找到IndexedDB存檔(" + savedData.length + "bytes),載入中...");
                ci.fsWriteFile(SAVE_KEY, savedData).then(function() {
                  log("✅ 已從IndexedDB恢復存檔");
                }).catch(function(e){ log("fsWriteFile err: " + e); });
              } else {
                log("使用zip內建存檔(FD2.SAV)");
              }
            });
          }

          if (event === "bnd-play") {
            statusEl.style.display = "none";
            // 每60秒自動persist存檔
            setInterval(function() {
              if (globalCi) persistSave(globalCi, true);
            }, 60000);
          }

          if (event === "ci-error") { log("CI ERROR"); }
        }
      });
    } else {
      log("Dos() function not available.");
    }

    // js-dos左側磁碟icon(ci.persist)仍然有效
    // 額外:監聽頁面關閉,觸發最後一次儲存
    window.addEventListener("beforeunload", function() {
      if (globalCi) persistSave(globalCi, true);
    });
  </script>
</body>
</html>
